[build]
command = "npm run build"
publish = "dist"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm run build"

[context.deploy-preview]
command = "npm run build"

[context.branch-deploy]
command = "npm run build"
